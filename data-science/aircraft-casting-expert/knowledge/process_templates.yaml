# 工艺流程模板：HB5480-91 铸造工艺规程
# 来源：HB5480-91 4.2, 4.8, 6.2, HB 5446

metadata:
  source: "HB5480-91 4.2, 4.8, 6.2; HB 5446"
  last_updated: "2026-05-18"

# ============================================================
# 铸造工艺规程
# ============================================================
casting_process:
  overview: "铸造工艺应在正式生产前通过试生产样件确定，一经确定不应随意变更"
  standard_clause: "HB5480-91 4.2.1"
  key_parameters:
    - "合金熔炼工艺"
    - "浇注温度"
    - "铸型制备方法"
    - "浇注系统"
    - "冷铁大小及安放位置"
    - "浇注技术"
    - "热处理制度"
  change_triggers:
    description: "以下任一项改变时，应重新提供试生产样件进行检验鉴定"
    items:
      - "制造新模型或金属型（含复制模型）"
      - "浇注系统、激冷系统、补缩系统改变"
      - "浇注工艺改变"
      - "要求提高强度"
      - "更换工厂"
      - "熔炼工艺改变"
    standard_clause: "HB5480-91 4.2.3"

# ============================================================
# 热处理流程
# ============================================================
heat_treatment:
  overview: "铸件热处理按HB5480-91表6、表7进行，其它要求符合HB5446"
  standard_clause: "HB5480-91 4.8.1"
  stages:

    - stage: 1
      name: "固溶处理"
      english: "Solution Treatment"
      inputs:
        - "铸件（清整完毕）"
        - "固溶炉（控温精度±5°C）"
        - "淬火水槽（水温≤40°C，或ZL114A的≤30°C）"
        - "计时器"
      steps:
        - "铸件入炉，炉温≤200°C（防止热冲击开裂）"
        - "按工艺设定升温至目标温度（见parameters.yaml）"
        - "保温按厚度计算：每25mm≥1h，最少保温时间见parameters.yaml"
        - "出炉后尽快转移入水槽淬火（转移时间≤10s，ZL114A为≤8s）"
        - "淬火水搅拌，记录入水时间和水温"
      outputs:
        - "固溶处理后铸件（T4状态）"
        - "工艺记录（炉号/温度曲线/保温时间/淬火水温/转移时间）"
      key_controls:
        - "炉温均匀性：有效工作区温度差≤10°C"
        - "淬火转移时间：从出炉到完全浸入水≤10s（或ZL114A为8s）"
        - "淬火水温：≤40°C（或ZL114A为≤30°C）"
        - "淬火水量：铸件入水后水温温升≤20°C"
      critical_limits:
        - "绝对禁止超过表6温度上限+10°C（过烧风险）"
        - "转移时间超标必须标记，不得直接使用"
        - "水温超标必须记录并评估"
      common_defects:
        - "温度超标：立即停止，查明原因，评估是否报废"
        - "转移时间超限：降级使用或重新固溶"
        - "水温超标：换水后再淬火，已淬火件标记待评估"
      standard_clause: "HB5480-91 4.8.1, 表6, HB 5446"

    - stage: 2
      name: "时效处理"
      english: "Aging Treatment"
      inputs:
        - "固溶处理后铸件"
        - "时效炉（控温精度±5°C）"
        - "工艺卡（注明合金+状态+温度+时间）"
      steps:
        - "铸件入炉"
        - "按工艺设定升温至目标温度（见parameters.yaml）"
        - "保温规定时间（见parameters.yaml）"
        - "出炉后空冷（禁止水冷）"
      outputs:
        - "时效处理后铸件（T5/T6/T7状态）"
        - "工艺记录（炉号/温度/保温时间/出炉时间）"
      key_controls:
        - "时效温度：ZL205A T6为170~180°C，其他合金T6为150~170°C"
        - "保温时间：严格按工艺文件"
        - "出炉后空冷：严禁水冷（引入应力）"
      critical_limits:
        - "ZL205A的时效温度与其他合金不同，必须单独控制"
        - "保温时间不足不得用延长时效来补救，必须返工"
      common_defects:
        - "温度偏差：记录，评估对时效效果的影响"
        - "保温不足：严重时重新时效处理"
        - "提前出炉：记录，实际保温时间作为参考"
      standard_clause: "HB5480-91 4.8.1, 表7, HB 5446"

# ============================================================
# 检验流程
# ============================================================
inspection_flow:
  overview: "每批铸件需通过荧光检验、X射线检验和力学性能检验"
  standard_clause: "HB5480-91 第5章, 第6章"
  stages:

    - stage: 1
      name: "荧光渗透检验"
      english: "Fluorescent Penetrant Inspection"
      short_name: "荧光检验"
      inputs:
        - "铸件（表面清洁）"
        - "荧光渗透液"
        - "紫外灯（365nm）"
      steps:
        - "清洁铸件表面（去除油污、切屑、残留型砂）"
        - "均匀喷涂荧光渗透液，保持湿润10~30min"
        - "去除表面多余渗透液（水或清洗剂）"
        - "用干净布或纸擦干"
        - "在暗室中用紫外灯照射观察"
        - "记录缺陷位置和特征"
      outputs:
        - "荧光检验记录"
        - "缺陷标记（需要返工或拒收的铸件）"
      application: "表面缺陷：裂纹、冷隔、气孔（表面）、夹杂物（表面）"
      acceptance_criteria:
        - "不允许有裂纹"
        - "不允许有冷隔"
        - "不允许有穿透性缺陷"
        - "其他表面缺陷由供需双方商定"
      standard_clause: "HB5480-91 5.2, 4.4.1, HB/Z61"

    - stage: 2
      name: "X射线照相检验"
      english: "Radiographic Inspection"
      short_name: "X射线检验"
      inputs:
        - "铸件"
        - "X射线机"
        - "标准射线底片（HB5480-91 附录A）"
      steps:
        - "选择与铸件厚度匹配的标准底片（≤12mm用6mm底片，>12mm用20mm底片）"
        - "按HB/Z60要求进行X射线照相"
        - "底片冲洗（密度2.00~2.25）"
        - "用透射光观察底片"
        - "与标准射线底片对照评级"
        - "记录缺陷类型、尺寸、数量和位置"
      outputs:
        - "X射线底片"
        - "X射线检验报告"
        - "评级结论"
      application: "内部缺陷：气孔、缩孔、海绵状疏松、夹杂物、偏析"
      acceptance_criteria:
        - "按表2和附录A评级"
        - "超标缺陷对应的铸件拒收"
        - "处于两可之间的铸件由主管技术人员和需方检验人员酌情验收"
      standard_clause: "HB5480-91 5.3, 4.5.3~4.5.5, HB/Z60, 附录A"

    - stage: 3
      name: "力学性能试验"
      english: "Mechanical Property Test"
      short_name: "力学性能"
      inputs:
        - "试样（单铸试棒/附铸试块/铸件切取试样）"
        - "拉伸试验机（符合GB 228）"
      steps:
        - "加工标准圆形试样（工作部分直径10mm，标距5D）"
        - "如不能切取标准试样，允许用小直径试样或板状试样"
        - "测量试样尺寸"
        - "安装试样于拉伸试验机"
        - "加载，记录抗拉强度、屈服强度、伸长率"
        - "断口检查（气孔、夹杂物等视为试验无效）"
      outputs:
        - "力学性能试验报告（σb/σ0.2/δ5）"
        - "结论（是否符合表3或表4相应级别要求）"
      sampling_rules:
        - "单铸试棒：每个熔炼炉次至少2个，与铸件同炉熔炼+同炉热处理"
        - "附铸试块：大铸件（浇注重量>50kg），每个熔炼炉次至少1个"
        - "铸件切取试样：按设计图样规定的取样部位和方法"
      acceptance_criteria:
        - "单铸试棒：ZL101A/ZL105A/ZL114A应符合表3的2级要求，ZL205A应符合HB962"
        - "附铸试块/铸件切取试样：符合设计图样规定的力学性能级别"
      standard_clause: "HB5480-91 6.2.4, GB 228"

    - stage: 4
      name: "外观和尺寸检验"
      english: "Visual and Dimensional Inspection"
      short_name: "外观检验"
      inputs:
        - "铸件"
        - "量具（卡尺、高度尺等）"
        - "放大镜（10倍）"
      steps:
        - "目视检查铸件表面缺陷"
        - "使用10倍放大镜检查细小缺陷"
        - "测量铸件主要尺寸"
        - "检查铸件标记（炉批号、热处理印记、检验印记）"
        - "记录不合格项"
      outputs:
        - "外观和尺寸检验记录"
      acceptance_criteria:
        - "铸件表面不允许有裂纹、冷隔、穿透性缺陷（HB5480-91 4.4.1）"
        - "浇冒口残留量不超过设计图样规定（HB5480-91 4.4.2）"
        - "表面粗糙度符合设计图样规定（HB5480-91 4.4.3）"
        - "尺寸公差符合HB 6103（HB5480-91 4.7）"
      standard_clause: "HB5480-91 6.2.5, 4.4, 4.7"

# ============================================================
# 交货准备流程
# ============================================================
delivery_preparation:
  steps:
    - "包装：按需方要求包装，每个包装容器应具有清晰标志"
    - "存放：铸件不应露天存放，防止机械损伤、变形和锈蚀"
    - "运输：搬动和运输中应防止机械损伤"
    - "合格证：每批铸件附质量合格证，内容包括化学分析、力学性能、无损检验等结果"
  standard_clause: "HB5480-91 第7章, 8.1~8.3"

# ============================================================
# 焊补与矫正流程
# ============================================================
repair_and_correction:
  welding:
    precondition: "必须得到需方的书面许可"
    sequence: "焊补应在铸件最终热处理和本标准规定的检查之前完成"
    requirements:
      - "焊补区域应便于检查"
      - "焊补后的铸件应通过与未焊补铸件相同的检查"
      - "焊补后需重新通过荧光检验和X射线检验"
    standard_clause: "HB5480-91 4.9.1"
  correction:
    precondition: "没有需方书面许可，不应在人工时效之后进行机械矫正"
    allowed_states:
      - "铸造状态"
      - "固溶热处理状态"
    sequence: "矫正应在荧光检验之前完成"
    standard_clause: "HB5480-91 4.9.2"

# ============================================================
# 不合格处理与复验流程
# ============================================================
nonconformance:
  mechanical_test_failure:
    steps:
      - "确认试验本身是否有效（故障或试样断口有气孔/夹杂物时视为无效）"
      - "如有效，允许补充试样"
      - "对每一个不合格试样，供方再取两个试样复验"
      - "复验试样应邻近原取样部位切取"
      - "每个复验试样的结果都应超过规定要求"
      - "两个复验试样和不合格试样试验结果的平均值也应超过规定要求"
      - "每批只允许抽取一次样件进行复验"
      - "复验结果不合格时，该批铸件应拒收"
    standard_clause: "HB5480-91 6.3.1"
  other_test_failure:
    steps:
      - "在其它抽样试验中，如果有一个样件不符合规定要求"
      - "对该批铸件中所有的铸件进行检查"
    standard_clause: "HB5480-91 6.3.2"
  borderline:
    condition: "处于验收和拒收两可之间的铸件"
    decision: "由主管技术人员和需方检验人员根据使用要求和其它试验结果酌情验收"
    standard_clause: "HB5480-91 4.5.5"

# ============================================================
# 工艺流程图（文字版）
# ============================================================
process_flowchart:
  main_flow: "铸造 → 清整 → 热处理（固溶+淬火） → 时效 → 荧光检验 → X射线检验 → 力学性能检验 → 外观尺寸检验 → 焊补/矫正（如需） → 交货准备 → 包装出货"
  heat_treatment_detail: "固溶处理（加热→保温→淬火） → 时效处理（加热→保温→空冷）"
  inspection_detail: "荧光检验（表面） → X射线检验（内部） → 力学性能（拉伸） → 外观尺寸"
  nonconformance_flow: "不合格 → 复验（限一次） → 合格则出货，不合格则拒收"