# 术语表：HB5480-91 核心术语解释
# 每个术语包含：一句话定义、生活类比、标准条款引用

metadata:
  source: "HB5480-91"
  last_updated: "2026-05-18"

terminology:

  # ========== 合金牌号 ==========
  铸件:
    definition: "把熔化的金属液体浇进模具，冷却凝固后得到的零件"
    analogy: "用模具做冰棒——把果汁倒进模具，冻好之后脱模，就得到了一根固定形状的冰棒"
    standard_clause: "HB5480-91 1"
    related_terms: ["铸造", "砂型铸造"]

  铝合金铸件:
    definition: "以铝为基体材料，加入硅、铜、镁等元素形成的合金，通过铸造工艺成型的零件"
    analogy: "铝合金就像在铝里加了'调料'——铝本身软，加了硅更耐磨，加了铜更结实"
    standard_clause: "HB5480-91 1, HB 962"

  合金牌号:
    definition: "给不同配方的铝合金编的'身份证号'，ZL101A表示一种特定成分的铝硅合金"
    analogy: "就像奶粉罐上的段位标签——一段、二段、三段分别对应不同配方，牌号就是告诉你这批'金属配方'到底是什么"
    standard_clause: "HB5480-91 3, HB 962"

  ZL101A:
    definition: "Al-Si-Mg系铝合金，铸造性能好，用于一般结构件，强度约310MPa"
    analogy: "铝合金里的'中档车'——性能均衡，用途最广"
    standard_clause: "HB5480-91 表3, HB 962"

  ZL105A:
    definition: "Al-Si-Cu-Mg系铝合金，加入铜提高强度，用于发动机附件，强度约340MPa"
    analogy: "加了铜的铝合金像'运动版'——更结实但耐腐蚀性略差"
    standard_clause: "HB5480-91 表3, HB 962"

  ZL114A:
    definition: "Al-Si-Mg系高纯铝合金，杂质少、性能稳定，用于关键受力件，强度约360MPa"
    analogy: "铝合金里的'高配版'——杂质少，性能更稳定可靠"
    standard_clause: "HB5480-91 表3, HB 962"

  ZL205A:
    definition: "Al-Cu系铝合金，铜含量最高（4.6-5.3%），强度最高（≥450MPa），用于主承力结构件"
    analogy: "铝合金里的'重载卡车'——最结实也最脆，不能直接敲打"
    standard_clause: "HB5480-91 表3, HB 962"

  # ========== 热处理状态 ==========
  热处理:
    definition: "通过'加热→保温→冷却'改变材料内部结构，让铸件获得想要的强度和韧性"
    analogy: "炒菜的火候控制——大火爆炒、小火慢炖、出锅过冷水，不同加热和冷却方式让食材口感完全不同"
    standard_clause: "HB5480-91 4.8, HB 5446"

  固溶处理:
    definition: "把铸件加热到高温让合金元素充分溶入铝基体，然后快速冷却（淬火）把它们'锁'住"
    analogy: "泡茶后迅速冰镇——茶叶里的成分充分溶进热水里，然后马上放冰箱急冻，把茶味'冻住'不让它跑掉"
    standard_clause: "HB5480-91 4.8.1, 表6, HB 5446"

  时效处理:
    definition: "固溶处理之后，在特定温度下保温一段时间，让材料内部慢慢析出强化相，逐渐变硬变强"
    analogy: "红酒醒酒——刚开瓶的单宁很生硬，放置一段时间后口感变得圆润饱满，材料也是'放一放'性能才到位"
    standard_clause: "HB5480-91 4.8.1, 表7, HB 5446"

  T4:
    definition: "固溶处理后自然时效状态——固溶后空冷，不进行人工时效，强度中等"
    analogy: "蒸好的馒头直接吃——已经熟了，但还有点软"
    standard_clause: "HB5480-91 4.8.1, 表6"
    related_terms: ["固溶处理"]

  T5:
    definition: "铸造后直接人工时效——不经过固溶处理，直接时效，强度一般但效率高"
    analogy: "馒头只吹风冷却——没蒸透，软趴趴，但省事"
    standard_clause: "HB5480-91 4.8.1, 表7"
    related_terms: ["时效处理"]

  T6:
    definition: "先固溶再人工时效——强度最高，应用最广"
    analogy: "先发酵再蒸的馒头——蓬松又结实，是最常用的热处理方式"
    standard_clause: "HB5480-91 4.8.1, 表7"
    related_terms: ["固溶处理", "时效处理"]

  T7:
    definition: "固溶后过时效——牺牲一点强度，换取更好的尺寸稳定性和抗腐蚀能力"
    analogy: "馒头多蒸一会儿——个头略小但更结实不塌"
    standard_clause: "HB5480-91 4.8.1, 表7, 4.8.2"
    related_terms: ["固溶处理", "时效处理"]

  淬火:
    definition: "固溶处理后快速冷却——把高温状态下溶入的合金元素'冻住'在铝基体里"
    analogy: "冰镇饮料——热的液体迅速变冷，里面的东西被'冻住'来不及沉淀"
    standard_clause: "HB5480-91 表6, HB 5446"

  # ========== 力学性能 ==========
  抗拉强度:
    definition: "拉伸试验中试样被拉断前承受的最大应力，单位MPa，代表材料'能扛多大劲儿不断'"
    analogy: "拔河绳子的极限——持续加力，绳子在断裂那一瞬间承受的力就是它的抗拉强度"
    standard_clause: "HB5480-91 3.3, 表3, 表4, GB 228"
    symbol: "σb"
    unit: "MPa"

  规定残余伸长应力:
    definition: "材料开始产生0.2%永久变形时对应的应力值，代表'开始发生不可恢复损伤的临界点'"
    analogy: "橡皮筋拉长后松手，如果回不到原样了（长出了0.2%），说明拉力过了它的'屈服点'"
    standard_clause: "HB5480-91 3.3, 表3, 表4, GB 228"
    symbol: "σ0.2"
    unit: "MPa"

  伸长率:
    definition: "拉断后试样标距段伸长的百分比，数值越大说明材料越'韧'、断裂前能变形的余地越大"
    analogy: "拉面的延展性——好面团能拉很长不断，差面团一拉就断，伸长率就是衡量'能拉多长才断'的指标"
    standard_clause: "HB5480-91 3.3, 表3, 表4, GB 228"
    symbol: "δ5"
    unit: "%"

  # ========== 缺陷类型 ==========
  气孔:
    definition: "金属液在浇注过程中裹入空气，或溶解的气体在冷却时析出，凝固后留在零件里形成空洞"
    analogy: "面包里的气泡——切开面包，里面大大小小的气孔是正常的，但如果气孔太大太密，面包就松散了"
    standard_clause: "HB5480-91 5.2, 附录A2.1"
    detection: ["荧光渗透检验", "X射线照相"]
    severity: "根据缺陷尺寸和分布按表2评定"

  针孔:
    definition: "微小的气孔，通常呈圆形或长条形，遍布于整个铸件区域"
    analogy: "用针在面包上戳的密密麻麻的小孔——单个看很小，但成片出现影响结构强度"
    standard_clause: "HB5480-91 附录A2.2"
    detection: ["X射线照相"]

  缩孔:
    definition: "金属凝固收缩时得不到补充，在铸件内部或表面形成的树枝状、纤维状或锯齿状孔洞"
    analogy: "天冷时水管冻裂——水结冰体积膨胀，把水管撑出了裂缝"
    standard_clause: "HB5480-91 5.2.2, 附录A2.3"
    detection: ["X射线照相", "金相检验"]
    handling: "拒收"

  海绵状疏松:
    definition: "局部呈花边状或蜂窝状的疏松区域，组织不致密"
    analogy: "海绵的孔隙——吸水能力很强但结构松散，强度远不如密实材料"
    standard_clause: "HB5480-91 附录A2.4"
    detection: ["X射线照相"]
    handling: "拒收"

  夹杂物:
    definition: "砂子、焊泥、氧化物、浮渣或其他不纯物质混入金属形成的缺陷"
    analogy: "米饭里的沙子——沙子和米混在一起，吃的时候硌牙"
    standard_clause: "HB5480-91 5.2.3, 附录A2.5"
    detection: ["荧光渗透检验", "X射线照相"]
    handling: "拒收"

  偏析:
    definition: "合金元素在凝固过程中分布不均匀，部分区域某种元素浓度异常高或低"
    analogy: "盐水结冰——冰块里盐分少，大部分盐留在剩余的水里，造成成分不均匀"
    standard_clause: "HB5480-91 附录A2.6"
    handling: "零容忍，任何含量均不允许"
    note: "在X射线底片上以不同黑度出现，是严重质量问题"

  裂纹:
    definition: "铸件表面或内部出现的裂缝，会严重影响强度"
    analogy: "塑料瓶被摔裂——还没断成两截，但已经有裂缝，继续受力会从这里断开"
    standard_clause: "HB5480-91 4.4.1"
    detection: ["荧光渗透检验", "目视检查"]
    handling: "零容忍，拒收"

  冷隔:
    definition: "金属液浇注时两股液流没有完全熔合，在铸件表面形成的线状痕迹或浅裂缝"
    analogy: "两片面包叠放时没压紧，中间有缝隙——看起来连着，但分层了"
    standard_clause: "HB5480-91 4.4.1"
    detection: ["荧光渗透检验", "目视检查"]
    handling: "零容忍，拒收"

  # ========== 检验方法 ==========
  荧光渗透检验:
    definition: "在铸件表面涂上荧光渗透液，让液体渗进表面裂纹里，洗掉表面多余液体后在紫外灯下观察，裂纹处会发出黄绿色荧光"
    analogy: "用荧光笔涂在纸上裂痕处——平时看不清的裂缝，在验钞灯下一照就亮得清清楚楚"
    standard_clause: "HB5480-91 5.2, HB/Z61"
    application: "表面缺陷（裂纹、冷隔、气孔、夹杂物）"

  X射线照相检验:
    definition: "用X射线穿透铸件，内部缺陷（气孔、缩松、夹渣）会在底片上留下黑影，像给铸件拍'透视照片'"
    analogy: "机场安检扫描行李——箱子不用打开，X光一照，里面的东西看得一清二楚"
    standard_clause: "HB5480-91 5.3, HB/Z60"
    application: "内部缺陷（气孔、缩松、夹杂物）"

  晶间腐蚀倾向:
    definition: "材料在特定环境下，晶粒边界发生的腐蚀倾向，会导致材料变脆"
    analogy: "砖墙的灰浆被雨水冲掉——看起来墙还在，但一碰就碎"
    standard_clause: "HB5480-91 5.7, HB 5255"
    test_scope: "ZL205A T7铸件必须检验"

  # ========== 铸件分类 ==========
  I类铸件:
    definition: "单独破坏将会危及人身安全或引起飞机、导弹和其它装备破坏的铸件——最高安全等级"
    analogy: "飞机起落架的连接件——断了会机毁人亡"
    standard_clause: "HB5480-91 3.1"
    xray_requirement: "每批所有铸件全面检查"

  II类铸件:
    definition: "单独破坏将会引起重大操作故障及飞机、导弹和其它装备重要结构失效的铸件"
    analogy: "飞机发动机的安装支架——坏了发动机可能脱落"
    standard_clause: "HB5480-91 3.1"
    xray_requirement: "每批所有铸件全面检查（认可初期）"

  III类铸件:
    definition: "安全系数大于200%的一般用途铸件，破坏不会直接危及安全"
    analogy: "飞机内饰的装饰件——坏了不影响飞行安全"
    standard_clause: "HB5480-91 3.1"
    xray_requirement: "按抽样表抽取检查"

  # ========== 工艺相关 ==========
  熔炼批:
    definition: "同一炉熔炼的合金，熔化后连续不超过8h内生产的铸件，作为一批进行检验"
    standard_clause: "HB5480-91 6.1.1"

  铸造批:
    definition: "总重量不超过500kg的同样铸件组成一批，一次提交检验"
    requirements:
      - "同一炉次的合金浇注"
      - "同一次热处理"
      - "同样的铸造工艺生产"
    standard_clause: "HB5480-91 6.1.2"

  焊补:
    definition: "用焊接方法修补铸件缺陷，必须得到需方书面许可，且修补后需重新通过全部检验"
    analogy: "衣服破了个洞，用针线缝补——缝得好还能穿，但缝不好可能从缝处再裂开"
    standard_clause: "HB5480-91 4.9.1"

  过烧:
    definition: "固溶处理时温度超过上限过多，导致晶界氧化，材料强度永久下降且无法挽救"
    analogy: "肉煮过头——煮太久肉就散了烂了，再加水煮也没用"
    risk: "过烧是不可逆缺陷，必须报废整批次"
    standard_clause: "HB5480-91 4.8.1, HB 5446"